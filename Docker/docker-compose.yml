version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: postgresql
    restart: unless-stopped
    environment:
      POSTGRES_USER: pinxiang
      POSTGRES_PASSWORD: pinxiang
      POSTGRES_DB: pinxiang_database
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: pinxiang@gmail.com
      PGADMIN_DEFAULT_PASSWORD: pinxiang
    ports:
      - "8080:80"
    depends_on:
      - postgres

volumes:
  postgres_data: