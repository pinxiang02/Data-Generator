# Extra database engines for testing the DataGen database sink.
# Ports are offset from the defaults to avoid clashing with other local containers.
#
#   Oracle  -> localhost:1523  service FREEPDB1  (user: datagen / datagen)
#   MySQL   -> localhost:3307   db datagen       (user: datagen / datagen)
#   MongoDB -> localhost:27018  db datagen       (user: datagen / datagen)
services:
  oracle:
    image: gvenzl/oracle-free:slim-faststart
    container_name: datagen_oracle
    ports:
      - "1523:1521"
    environment:
      ORACLE_PASSWORD: oracle          # SYS/SYSTEM password
      APP_USER: datagen                # created in pluggable DB FREEPDB1
      APP_USER_PASSWORD: datagen
    volumes:
      - oracle_data:/opt/oracle/oradata
    restart: unless-stopped

  mysql:
    image: mysql:8
    container_name: datagen_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: datagen
      MYSQL_USER: datagen
      MYSQL_PASSWORD: datagen
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: datagen_mongodb
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: datagen
      MONGO_INITDB_ROOT_PASSWORD: datagen
      MONGO_INITDB_DATABASE: datagen
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  oracle_data:
  mysql_data:
  mongo_data:
